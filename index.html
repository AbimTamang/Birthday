<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>I Love You ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%; height: 100%;
      background: #0f0c29;  /* fallback for old browsers */
      background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
      font-family: 'Quicksand', sans-serif;
      color: #fff;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── CANVAS PARTICLES ─── */
    canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ─── CONTAINER ─── */
    .container {
      position: relative; z-index: 10;
      text-align: center;
      width: 90%; max-width: 600px;
    }

    /* ─── STATE 1: THE HEART ─── */
    #startScreen {
      display: flex; flex-direction: column; align-items: center; gap: 30px;
      transition: opacity 1s ease, transform 1s ease;
    }
    #startScreen.hidden {
      opacity: 0; transform: scale(1.2); pointer-events: none; position: absolute;
    }

    .for-you {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 5rem);
      color: #ff9a9e;
      text-shadow: 0 0 20px rgba(255,154,158,0.5);
      opacity: 0; animation: fadeIn 2s ease forwards 0.5s;
    }

    .heart-btn {
      font-size: clamp(5rem, 15vw, 8rem);
      cursor: pointer;
      filter: drop-shadow(0 0 30px rgba(255,107,129,0.8));
      animation: heartbeat 1.5s infinite;
      transition: transform 0.3s;
      opacity: 0; animation: heartbeat 1.5s infinite, fadeIn 2s ease forwards 1.5s;
    }
    .heart-btn:active { transform: scale(0.9); }

    .tap-text {
      font-size: 1rem; letter-spacing: 3px; color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0; animation: fadeIn 2s ease forwards 2.5s;
    }

    /* ─── STATE 2: THE MESSAGE ─── */
    #messageScreen {
      opacity: 0; pointer-events: none; transform: scale(0.9);
      transition: opacity 1.5s ease 0.5s, transform 1.5s ease 0.5s;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
      width: 90%; max-width: 600px;
    }
    #messageScreen.show {
      opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1);
    }

    .ily-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(4rem, 12vw, 7rem);
      color: #ff6b81;
      text-shadow: 0 0 30px rgba(255,107,129,0.8);
      line-height: 1; margin-bottom: 10px;
    }

    .message-body {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: clamp(20px, 5vw, 40px);
      font-size: clamp(1rem, 3vw, 1.3rem);
      line-height: 1.8; font-weight: 300;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .reason {
      margin-bottom: 15px;
      opacity: 0; transform: translateY(15px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reason.show { opacity: 1; transform: translateY(0); }

    /* Animations */
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
    }
    @keyframes fadeIn { to { opacity: 1; } }

  </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>

<div class="container">
  
  <!-- STATE 1 -->
  <div id="startScreen">
    <div class="for-you">Just for you...</div>
    <div class="heart-btn" id="openBtn">❤️</div>
    <div class="tap-text">Tap the heart</div>
  </div>

  <!-- STATE 2 -->
  <div id="messageScreen">
    <div class="ily-title">I Love You</div>
    <div class="message-body">
      <div class="reason">You are the best thing that ever happened to me.</div>
      <div class="reason">Your smile makes my whole world brighter.</div>
      <div class="reason">Every moment with you feels like magic.</div>
      <div class="reason">I just wanted to remind you how special you are.</div>
      <div class="reason" style="margin-top: 25px; font-family: 'Great Vibes', cursive; font-size: 2rem; color: #ff9a9e;">Forever & Always 💕</div>
    </div>
  </div>

</div>

<script>
// ── SIMPLE FLOATING HEARTS & STARS CANVAS ──
const canvas = document.getElementById('starsCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = Math.random() * 2 + 0.5;
    this.speedY = Math.random() * 0.5 + 0.2;
    this.opacity = Math.random() * 0.5 + 0.2;
    this.isHeart = Math.random() > 0.8;
  }
  update() {
    this.y -= this.speedY;
    if (this.y < -10) {
      this.y = H + 10;
      this.x = Math.random() * W;
    }
  }
  draw() {
    ctx.globalAlpha = this.opacity;
    if (this.isHeart) {
      ctx.fillStyle = '#ff6b81';
      ctx.font = '10px Arial';
      ctx.fillText('❤', this.x, this.y);
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

for (let i = 0; i < 50; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

// ── INTERACTION LOGIC ──
const startScreen = document.getElementById('startScreen');
const messageScreen = document.getElementById('messageScreen');
const reasons = document.querySelectorAll('.reason');

document.getElementById('openBtn').addEventListener('click', () => {
  // Hide state 1
  startScreen.classList.add('hidden');
  
  // Show state 2 after a small delay
  setTimeout(() => {
    messageScreen.classList.add('show');
    
    // Cascade animate the reasons
    reasons.forEach((r, index) => {
      setTimeout(() => {
        r.classList.add('show');
      }, 800 + (index * 800)); // 800ms delay between each line
    });
    
  }, 800);
});
</script>
</body>
</html>
